<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>출석 체크 로그인</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f4f1;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;
  box-shadow:0 1px 3px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.06);border:1px solid #e5e7eb;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:22px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;color:#111827}
.sub{font-size:14px;color:#6b7280;margin-bottom:28px;line-height:1.6}
.cafe-badge{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;color:#4f46e5;
  font-size:12px;font-weight:700;padding:5px 12px;border-radius:100px;margin-bottom:20px}
#gsi-wrap{display:flex;justify-content:center;margin-bottom:16px}
.notice{font-size:11px;color:#9ca3af;line-height:1.6}
.ld{display:none;flex-direction:column;align-items:center;gap:12px}
.ld-spin{width:32px;height:32px;border-radius:50%;border:3px solid rgba(79,70,229,.12);
  border-top-color:#4f46e5;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-txt{font-size:14px;color:#6b7280}

/* 브라우저 안내 카드 */
.browser-card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:380px;
  box-shadow:0 1px 3px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.06);border:1px solid #e5e7eb;text-align:center}
.browser-icon{font-size:52px;margin-bottom:14px}
.browser-title{font-size:20px;font-weight:900;color:#111827;margin-bottom:8px}
.browser-sub{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:20px}
.browser-guide{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;
  padding:16px;font-size:12px;color:#374151;line-height:1.9;text-align:left;margin-bottom:20px}
.browser-guide b{color:#111827}
.browser-btn{width:100%;padding:14px;background:#4f46e5;color:#fff;border:none;
  border-radius:14px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;margin-bottom:10px}
.browser-btn-sub{width:100%;padding:11px;background:transparent;color:#9ca3af;border:none;
  font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
</style>
</head>
<body>

<!-- 로그인 카드 (기본) -->
<div class="card" id="login-card">
  <div class="icon">📚</div>
  <div class="cafe-badge" id="cafe-badge">✦ StudyCafe</div>
  <h1>출석 체크 로그인</h1>
  <p class="sub">구글 계정으로 로그인하면<br>출석 체크 페이지로 이동합니다.</p>
  <div id="gsi-wrap"></div>
  <div class="ld" id="ld">
    <div class="ld-spin"></div>
    <div class="ld-txt">로그인 처리 중...</div>
  </div>
  <p class="notice">로그인 정보는 출석 기록에만 사용됩니다.</p>
</div>

<!-- 브라우저 안내 카드 (인앱 브라우저 감지 시) -->
<div class="browser-card" id="browser-card" style="display:none">
  <div class="browser-icon">🌐</div>
  <div class="browser-title">Chrome으로 열어주세요</div>
  <p class="browser-sub">
    현재 브라우저에서는 구글 로그인이<br>
    제한될 수 있습니다.<br>
    <b>Chrome 또는 Safari</b>로 열어주세요.
  </p>
  <div class="browser-guide">
    <b>📱 아이폰 (Safari)</b><br>
    하단 공유 버튼 → Safari로 열기<br><br>
    <b>📱 안드로이드 (Chrome)</b><br>
    우측 상단 ⋮ 메뉴 → Chrome으로 열기<br>
    또는 주소 복사 후 Chrome에서 붙여넣기
  </div>
  <button class="browser-btn" onclick="tryOpenExternal()">외부 브라우저로 열기</button>
  <button class="browser-btn-sub" onclick="showLoginAnyway()">그냥 로그인 시도하기</button>
</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQbwTVvf31E-0gCrGZQoNo-2TD9JQrVnbS7Ux_nrZPtY33xKlzeYx4X0kjKMPOde9aHA/exec';
var GSI_CLIENT_ID   = '477063853742-6uqsloh4lnrr24en4ajt7ju5nhcf0vp1.apps.googleusercontent.com';

function qp(name) {
  return new URLSearchParams(window.location.search).get(name) || '';
}

var urlToken = qp('token');
var urlDate  = qp('date');
var cafeName = qp('cafe') || 'StudyCafe';

document.getElementById('cafe-badge').textContent = '✦ ' + cafeName;
document.title = '출석 로그인 — ' + cafeName;

// 인앱 브라우저 감지
function isInAppBrowser() {
  var ua = navigator.userAgent.toLowerCase();
  return /naver|kakaotalk|line|instagram|fban|fbav|twitter|wechat|samsungbrowser/.test(ua);
}

// 외부 브라우저로 열기 시도
function tryOpenExternal() {
  var url = location.href;
  // intent 방식 (안드로이드)
  if (/android/.test(navigator.userAgent.toLowerCase())) {
    location.href = 'intent://' + url.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
  } else {
    // iOS - 그냥 현재 URL 복사 안내
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        alert('주소가 복사되었습니다!\nChrome 또는 Safari 주소창에 붙여넣기 해주세요.');
      });
    } else {
      alert('주소창의 URL을 복사해서\nChrome 또는 Safari에서 열어주세요.\n\n' + url);
    }
  }
}

// 그냥 로그인 시도
function showLoginAnyway() {
  document.getElementById('browser-card').style.display = 'none';
  document.getElementById('login-card').style.display = 'block';
  initGSI();
}

// 페이지 로드 시 브라우저 체크
window.addEventListener('load', function() {
  if (isInAppBrowser()) {
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('browser-card').style.display = 'block';
  } else {
    initGSI();
  }
});

function initGSI() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(initGSI, 300);
    return;
  }
  google.accounts.id.initialize({
    client_id: GSI_CLIENT_ID,
    callback: onGSIResponse,
    auto_select: false
  });
  google.accounts.id.renderButton(
    document.getElementById('gsi-wrap'),
    { theme: 'outline', size: 'large', width: 300, locale: 'ko', text: 'signin_with' }
  );
}

function onGSIResponse(response) {
  document.getElementById('gsi-wrap').style.display = 'none';
  document.getElementById('ld').style.display = 'flex';
  var parts = response.credential.split('.');
  try {
    var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
    var params = new URLSearchParams({
      page:     'checkin',
      token:    urlToken,
      date:     urlDate,
      email:    payload.email,
      googleId: payload.sub,
      photoURL: payload.picture || ''
    });
    window.location.href = APPS_SCRIPT_URL + '?' + params.toString();
  } catch(e) {
    alert('로그인 처리 오류: ' + e.message);
    document.getElementById('gsi-wrap').style.display = 'flex';
    document.getElementById('ld').style.display = 'none';
  }
}
</script>
</body>
</html>
