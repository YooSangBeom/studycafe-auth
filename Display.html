<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>출석 QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f0ee;color:#111;
  display:flex;flex-direction:row;position:relative}
.grid{position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0}
.glow-left{position:fixed;width:900px;height:900px;border-radius:50%;
  background:radial-gradient(circle,rgba(79,70,229,.08) 0%,transparent 68%);
  top:50%;left:25%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.glow-right{position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.05) 0%,transparent 68%);
  top:50%;left:75%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.left-panel{width:48vw;height:100vh;display:flex;flex-direction:column;
  position:relative;z-index:1;padding:3vh 3vw;overflow:hidden;background:#111318}
.right-panel{width:52vw;height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;z-index:1;
  border-left:1px solid rgba(0,0,0,.08);background:#f8f8f6;overflow:hidden}
.corner-tl{position:absolute;top:2.5vh;left:1.5vw;
  background:#111318;border:1px solid rgba(0,0,0,.15);
  border-radius:1.2vw;padding:1.2vh 1.8vw;text-align:center;z-index:10}
.corner-tl .big{font-size:5vw;font-weight:900;color:#818cf8;display:block;
  font-family:'DM Mono',monospace;line-height:1}
.corner-tl .sm{font-size:.7vw;color:rgba(255,255,255,.5);letter-spacing:.1em;
  text-transform:uppercase;margin-top:.4vh;display:block}
.corner-tr{position:absolute;top:2.5vh;right:1.5vw;
  background:#111318;border:1px solid rgba(0,0,0,.15);
  border-radius:1vw;padding:1.2vh 1.5vw;font-family:'DM Mono',monospace;
  font-size:1.4vw;color:rgba(255,255,255,.7);z-index:10;display:none}
.qr-wrap{display:flex;flex-direction:column;align-items:center;width:100%}
.cafe-label{font-size:1.8vw;letter-spacing:.3em;color:#333;
  text-transform:uppercase;margin-bottom:.8vh;font-weight:700;margin-top:0}
.main-title{font-size:4.2vw;font-weight:900;letter-spacing:-.03em;
  color:#111318;margin-bottom:.8vh;text-align:center}
.sub{font-size:1.1vw;color:#888;font-weight:300;margin-bottom:1.5vh}
.qr-frame{position:relative;padding:2vw;border-radius:2.5vw;
  background:#fff;border:1px solid rgba(0,0,0,.1);margin-bottom:1.5vh;
  box-shadow:0 8px 40px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08)}
.qr-frame::before,.qr-frame::after,
.qr-frame .cb::before,.qr-frame .cb::after{
  content:'';position:absolute;width:2.2vw;height:2.2vw;border-color:#4f46e5;border-style:solid}
.qr-frame::before{top:-2px;left:-2px;border-width:.4vw 0 0 .4vw;border-radius:.8vw 0 0 0}
.qr-frame::after{top:-2px;right:-2px;border-width:.4vw .4vw 0 0;border-radius:0 .8vw 0 0}
.qr-frame .cb::before{bottom:-2px;left:-2px;border-width:0 0 .4vw .4vw;border-radius:0 0 0 .8vw}
.qr-frame .cb::after{bottom:-2px;right:-2px;border-width:0 .4vw .4vw 0;border-radius:0 0 .8vw 0}
#qr-canvas{border-radius:1vw;display:block}
#qr-raw{position:absolute;top:-9999px;left:-9999px;visibility:hidden}
.scan-line{position:absolute;left:2vw;right:2vw;height:3px;
  background:linear-gradient(90deg,transparent,#4f46e5,transparent);
  animation:scanY 3s linear infinite;pointer-events:none}
@keyframes scanY{0%{top:2vw;opacity:1}45%{top:calc(100% - 2vw);opacity:1}50%{opacity:0}55%{top:2vw;opacity:0}60%{opacity:1}}
.status-bar{display:flex;align-items:center;gap:1.5vw;
  background:#fff;border:1px solid rgba(0,0,0,.08);
  border-radius:1.2vw;padding:1vh 2vw;margin-bottom:.8vh;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.si{display:flex;flex-direction:column;align-items:center;gap:.3vh}
.sl{font-size:.6vw;color:#999;letter-spacing:.1em;text-transform:uppercase}
.sv{font-family:'DM Mono',monospace;font-size:.95vw;color:#222}
.sd{width:1px;height:2.5vh;background:rgba(0,0,0,.08)}
.live{display:inline-block;width:.5vw;height:.5vw;border-radius:50%;background:#16a34a;
  margin-right:.4vw;vertical-align:middle;animation:lp 1.6s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}50%{box-shadow:0 0 0 .4vw rgba(22,163,74,0)}}
.wifi-badge{display:inline-flex;align-items:center;gap:.5vw;
  background:#eef2ff;border:1px solid #c7d2fe;
  border-radius:100px;padding:.6vh 1.2vw;font-size:.75vw;color:#4f46e5;font-weight:600;
  margin-top:1vh;flex-shrink:0}
@keyframes qrFadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.qr-anim{animation:qrFadeIn .4s ease}
.reward-bar{width:100%;background:rgba(255,255,255,.06);border-radius:1.2vw;
  padding:1.4vh 1.8vw;margin-top:auto;display:flex;align-items:center;
  gap:1.4vw;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.reward-bar-title{font-size:.85vw;color:rgba(255,255,255,.6);font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;white-space:nowrap}
.reward-bar-items{display:flex;gap:.8vw;flex:1}
.rbi{display:flex;align-items:center;gap:.6vw;background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.1);border-radius:.8vw;padding:.7vh 1vw;
  flex:1;justify-content:center}
.rbi-emoji{font-size:1.4vw}
.rbi-info{display:flex;flex-direction:column;gap:.1vh}
.rbi-name{font-size:.75vw;color:rgba(255,255,255,.9);font-weight:700;white-space:nowrap}
.rbi-days{font-size:.65vw;color:#818cf8;font-weight:800}
.tab-bar{display:flex;gap:.6vw;margin-bottom:1.5vh;flex-shrink:0}
.tab-btn{flex:1;padding:.6vh 0;border:none;border-radius:.8vw;font-size:.8vw;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#4f46e5;color:#fff}
.tab-btn:not(.active){background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)}
.tab-content{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.tab-content.active{display:flex}
.rank-header{margin-bottom:1.5vh;flex-shrink:0}
.rank-month{font-size:.7vw;color:rgba(255,255,255,.4);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.6vh}
.rank-title{font-size:2vw;font-weight:900;letter-spacing:-.03em;color:#fff}
.rank-sub{font-size:.8vw;color:rgba(255,255,255,.4);margin-top:.3vh}
.rank-list{flex:1;display:flex;flex-direction:column;gap:.8vh;overflow:hidden;min-height:0}
.rank-item{display:flex;align-items:center;gap:1.2vw;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  border-radius:1.2vw;padding:.9vh 1.4vw;flex:1;min-height:0;overflow:hidden}
.rank-item.fadeout{opacity:0;transform:translateY(-8px);transition:all .3s}
.rank-item.fadein{animation:rankIn .5s ease forwards}
@keyframes rankIn{from{opacity:0;transform:translateY(1.5vh)}to{opacity:1;transform:translateY(0)}}
.rank-medal{width:3.5vw;height:3.5vw;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.8vw;flex-shrink:0}
.medal-1{background:linear-gradient(135deg,#fde68a,#f59e0b);box-shadow:0 2px 12px rgba(245,158,11,.4)}
.medal-2{background:linear-gradient(135deg,#e2e8f0,#94a3b8);box-shadow:0 2px 12px rgba(148,163,184,.3)}
.medal-3{background:linear-gradient(135deg,#fed7aa,#f97316);box-shadow:0 2px 12px rgba(249,115,22,.3)}
.medal-n{background:rgba(255,255,255,.1);font-size:1.1vw;font-weight:700;
  color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
.rank-info{flex:1;min-width:0}
.rank-email{font-size:1.3vw;color:rgba(255,255,255,.9);font-family:'DM Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.rank-phone{font-size:1vw;color:rgba(255,255,255,.5);margin-top:.2vh;font-family:'DM Mono',monospace}
.rank-next-reward{font-size:.7vw;color:#f59e0b;margin-top:.2vh;
  display:flex;align-items:center;gap:.3vw;white-space:nowrap;overflow:hidden}
.rank-next-reward .nr-bar{flex:1;height:.3vh;background:rgba(255,255,255,.1);
  border-radius:100px;overflow:hidden;max-width:6vw}
.rank-next-reward .nr-bar-fill{height:100%;border-radius:100px;
  background:linear-gradient(90deg,#f59e0b,#fde68a);transition:width .6s ease}
.rank-count{font-family:'DM Mono',monospace;font-size:2.2vw;font-weight:900;
  color:#818cf8;flex-shrink:0;min-width:4vw;text-align:right;line-height:1}
.rank-count span{font-size:.7vw;color:rgba(255,255,255,.3);font-weight:400}
.page-indicator{display:flex;gap:.4vw;justify-content:center;margin-top:.8vh;flex-shrink:0}
.pi-dot{width:.4vw;height:.4vw;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s}
.pi-dot.active{background:#818cf8;width:1.2vw;border-radius:.2vw}
.update-time{font-size:.6vw;color:rgba(255,255,255,.25);font-family:'DM Mono',monospace;
  text-align:center;margin-top:.4vh;flex-shrink:0}
.postit-header{flex-shrink:0;margin-bottom:1vh}
.postit-title{font-size:2.2vw;font-weight:900;color:#fff;letter-spacing:-.03em}
.postit-sub{font-size:.9vw;color:rgba(255,255,255,.4);margin-top:.3vh}
.postit-area{flex:1;position:relative;overflow:hidden;min-height:0;border-radius:1.2vw;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.postit{position:absolute;width:13vw;padding:1.6vh 1.4vw;border-radius:1vw;
  box-shadow:0 4px 16px rgba(0,0,0,.25),0 1px 4px rgba(0,0,0,.15);cursor:default}
.postit-pin{width:1.4vw;height:1.4vw;border-radius:50%;
  position:absolute;top:-.5vw;left:50%;transform:translateX(-50%);
  box-shadow:0 2px 6px rgba(0,0,0,.3)}
.postit-msg{font-size:1.1vw;font-weight:700;color:#222;line-height:1.6;
  word-break:keep-all;word-wrap:break-word;margin-top:.6vh}
.postit-time{font-size:.75vw;color:rgba(0,0,0,.55);margin-top:.6vh;
  font-family:'DM Mono',monospace;font-weight:600;
  background:rgba(0,0,0,.08);border-radius:4px;padding:1px 5px;display:inline-block}
.postit-y{background:#fef08a}.postit-p{background:#f5d0fe}
.postit-b{background:#bfdbfe}.postit-g{background:#bbf7d0}.postit-o{background:#fed7aa}
.pin-y{background:#eab308}.pin-p{background:#a855f7}
.pin-b{background:#3b82f6}.pin-g{background:#22c55e}.pin-o{background:#f97316}
@keyframes postitIn{
  0%{opacity:0;transform:scale(.5) rotate(var(--r)) translateY(-20px)}
  70%{opacity:1;transform:scale(1.05) rotate(var(--r))}
  100%{opacity:1;transform:scale(1) rotate(var(--r))}}
@keyframes postitOut{
  0%{opacity:1;transform:scale(1) rotate(var(--r))}
  100%{opacity:0;transform:scale(.8) rotate(var(--r)) translateY(10px)}}
@keyframes float{
  0%,100%{transform:rotate(var(--r)) translateY(0)}
  50%{transform:rotate(var(--r)) translateY(-6px)}}
.postit-empty{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:rgba(255,255,255,.2)}
.postit-empty-icon{font-size:3vw;margin-bottom:1vh}
.postit-empty-txt{font-size:.9vw}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow-left"></div>
<div class="glow-right"></div>

<!-- 왼쪽 패널 (랭킹/한마디) -->
<div class="left-panel">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-rank-btn" onclick="switchTab('rank')">🏆 이달의 출석왕</button>
    <button class="tab-btn" id="tab-note-btn" onclick="switchTab('note')">📌 오늘의 한마디</button>
  </div>
  <div class="tab-content active" id="tab-rank">
    <div class="rank-header">
      <div class="rank-month" id="rank-month">-- 월 출석 랭킹</div>
      <div class="rank-title">🏆 이달의 출석왕</div>
      <div class="rank-sub" id="rank-sub">데이터 로딩 중...</div>
    </div>
    <div class="rank-list" id="rank-list"></div>
    <div class="page-indicator" id="page-indicator"></div>
    <div class="update-time" id="update-time">업데이트 중...</div>
  </div>
  <div class="tab-content" id="tab-note">
    <div class="postit-header">
      <div class="postit-title">📌 오늘의 한마디</div>
      <div class="postit-sub" id="postit-sub">메시지를 불러오는 중...</div>
      <div style="font-size:.7vw;color:rgba(255,255,255,.3);margin-top:.3vh">한 달간 디스플레이에 표시됩니다</div>
    </div>
    <div class="postit-area" id="postit-area">
      <div class="postit-empty" id="postit-empty" style="display:none">
        <div class="postit-empty-icon">📝</div>
        <div class="postit-empty-txt">아직 한마디가 없어요. 출석 후 남겨보세요!</div>
      </div>
    </div>
  </div>
  <div class="reward-bar">
    <div class="reward-bar-title">🎁 리워드</div>
    <div class="reward-bar-items" id="reward-bar-items">
      <div class="rbi"><span class="rbi-emoji">⏳</span><div class="rbi-info"><span class="rbi-name">로딩중</span></div></div>
    </div>
  </div>
</div>

<!-- 오른쪽 패널 (QR) -->
<div class="right-panel">
  <div class="corner-tl">
    <span class="big" id="today-num">0</span>
    <span class="sm">오늘 출석</span>
  </div>
  <div class="corner-tr" id="clock">--:--:--</div>
  <div class="qr-wrap">
    <h1 class="main-title">출석 체크</h1>
    <p class="cafe-label" id="cafe-lbl">StudyCafe</p>
    <p class="sub">스마트폰으로 QR 코드를 스캔해 주세요</p>
    <div class="qr-frame" id="qr-frame">
      <div class="scan-line"></div>
      <canvas id="qr-canvas"></canvas>
      <div id="qr-raw"></div>
      <div class="cb"></div>
    </div>
    <div class="status-bar">
      <div class="si"><span class="sl">상태</span><span class="sv"><span class="live"></span>활성</span></div>
      <div class="sd"></div>
      <div class="si"><span class="sl">날짜</span><span class="sv" id="s-date">--</span></div>
      <div class="sd"></div>
      <div class="si"><span class="sl">갱신까지</span><span class="sv" id="s-timer">--:--:--</span></div>
      <div class="sd"></div>
      <div class="si"><span class="sl">토큰</span><span class="sv" id="s-token">------</span></div>
    </div>
    <div class="wifi-badge">🔒 매장 Wi-Fi에서만 출석 가능</div>
  </div>
  <a id="admin-btn" href="#"
    style="position:absolute;bottom:2.5vh;right:1.5vw;
      background:rgba(17,19,24,.08);border:1px solid rgba(0,0,0,.1);
      border-radius:.8vw;padding:.6vh 1vw;font-size:.65vw;color:#999;
      text-decoration:none;font-family:'DM Mono',monospace;transition:all .2s;z-index:10"
    onmouseover="this.style.background='#111318';this.style.color='#fff'"
    onmouseout="this.style.background='rgba(17,19,24,.08)';this.style.color='#999'">
    ⚙ 관리자
  </a>
</div>

<script>
// ── 지점별 설정 (여기만 수정하면 돼요) ──────────────────────
var CAFE_URLS = {
  'A': 'https://script.google.com/macros/s/AKfycbzcKku8quWmaDOQHiVPAoW-iqUAFzusXM9UuDmI7w6tkaHnmWWA3fg9bXTvshMOBk9F/exec',
  'B': 'https://script.google.com/macros/s/[AKfycbzxQiB04tHAmSmokQWb0vxSxw0r_hipgxQcOZAaZja2AvF6pOig8WvOOiukXZbXwOBV]/exec',
  'C': 'https://script.google.com/macros/s/[AKfycbyQbwTVvf31E-0gCrGZQoNo-2TD9JQrVnbS7Ux_nrZPtY33xKlzeYx4X0kjKMPOde9aHA]/exec',
  'D': 'https://script.google.com/macros/s/[AKfycbwrRXy6A5_Zky13whV46cx3-1Jhp6FbPcbjUwsJkmxjHEj9atZZJStArTlyBgZ72xg8LQ]/exec',
};
var LOGO_URL = 'https://play-lh.googleusercontent.com/aVTlh7-EuRIYzIPrVA1rkLxaMubV22zsVTKxcijMxmoAhuSZuxwP9Aq2pCbuw9EesLRk=w240-h480-rw';
// ─────────────────────────────────────────────────────────────

// URL 파라미터에서 지점 읽기 (?cafe=A, ?cafe=B ...)
var cafe = new URLSearchParams(window.location.search).get('cafe') || 'A';
var DEPLOY_URL = CAFE_URLS[cafe] || CAFE_URLS['A'];
var ORIENTATION = new URLSearchParams(window.location.search).get('orientation') || 'landscape';

var TODAY_STR   = '';
var TOKEN_VAL   = '';
var CAFE_NAME   = '';
var TODAY_COUNT = 0;
var LOGO_RATIO  = 0.22;
var currentDate = '';
var allRanking  = [];
var allRewards  = [];
var currentPage = 0;
var ITEMS_PER_PAGE = 5;
var totalPages  = 0;
var QR_SIZE     = 0;
var postitMessages = [];
var postitPage  = 0;
var POSTIT_PER_PAGE = 6;
var currentTab  = 'rank';
var postitColors = [
  {bg:'postit-y',pin:'pin-y'},{bg:'postit-p',pin:'pin-p'},
  {bg:'postit-b',pin:'pin-b'},{bg:'postit-g',pin:'pin-g'},{bg:'postit-o',pin:'pin-o'}
];

function pad(n){ return String(n).padStart(2,'0'); }
function getLocalDate(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function buildCheckinUrl(token,date){
  return DEPLOY_URL+'?page=checkin&token='+encodeURIComponent(token)+'&date='+date;
}
function maskEmail(email){
  if(!email) return '—';
  var p=email.split('@'); if(p.length<2) return email;
  var l=p[0];
  return (l.length<=3?l[0]+'***':l.substring(0,3)+'***')+'@'+p[1];
}
function maskPhone(phone){
  if(!phone) return '—';
  var p=String(phone).replace(/\D/g,'');
  return p.length<4?'****':'***-****-'+p.slice(-4);
}
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 초기 설정 로드 ───────────────────────────────────────────
function loadInitConfig() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', DEPLOY_URL + '?page=stats', true);
  xhr.timeout = 10000;
  xhr.onload = function(){
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.ok) {
        TODAY_COUNT = data.todayCount;
        document.getElementById('today-num').textContent = TODAY_COUNT;
      }
    } catch(e) {}
  };
  xhr.send();

  // 토큰/날짜는 checkin 페이지 파라미터와 동일하게 계산
  var xhr2 = new XMLHttpRequest();
  xhr2.open('GET', DEPLOY_URL + '?page=display', true);
  xhr2.timeout = 10000;
  xhr2.onload = function(){
    try {
      // HTML에서 token, today, cafeName 파싱
      var html = xhr2.responseText;
      var tokenMatch = html.match(/var TOKEN_VAL\s*=\s*'([^']+)'/);
      var todayMatch = html.match(/var TODAY_STR\s*=\s*'([^']+)'/);
      var cafeMatch  = html.match(/var CAFE_NAME\s*=\s*'([^']+)'/);
      if (tokenMatch) TOKEN_VAL = tokenMatch[1];
      if (todayMatch) TODAY_STR = todayMatch[1];
      if (cafeMatch)  CAFE_NAME = cafeMatch[1];
      document.getElementById('cafe-lbl').textContent = CAFE_NAME;
      document.title = '출석 QR — ' + CAFE_NAME;
      document.getElementById('admin-btn').href = DEPLOY_URL + '?page=admin';
      if (ORIENTATION === 'portrait') applyPortrait();
      renderQR(TOKEN_VAL, TODAY_STR);
    } catch(e) {}
  };
  xhr2.send();
}

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-rank').classList.toggle('active', tab==='rank');
  document.getElementById('tab-note').classList.toggle('active', tab==='note');
  document.getElementById('tab-rank-btn').classList.toggle('active', tab==='rank');
  document.getElementById('tab-note-btn').classList.toggle('active', tab==='note');
  if (tab==='note') renderPostits();
}

function startAutoTab() {
  setInterval(function(){
    switchTab(currentTab === 'rank' ? 'note' : 'rank');
  }, 10000);
}

function nextPostitPage() {
  if (!postitMessages.length) return;
  var tp = Math.ceil(postitMessages.length / POSTIT_PER_PAGE);
  if (tp <= 1) return;
  postitPage = (postitPage + 1) % tp;
  if (currentTab === 'note') renderPostits();
}

// ── 포스트잇 렌더링 ──────────────────────────────────────────
function renderPostits() {
  var area = document.getElementById('postit-area');
  area.querySelectorAll('.postit').forEach(function(el){
    el.style.animation = 'postitOut .4s ease forwards';
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 400);
  });
  if(!postitMessages.length){
    document.getElementById('postit-empty').style.display='flex';
    document.getElementById('postit-sub').textContent = '아직 한마디가 없어요';
    return;
  }
  document.getElementById('postit-empty').style.display='none';
  var tp = Math.ceil(postitMessages.length / POSTIT_PER_PAGE) || 1;
  var pageInfo = tp > 1 ? ' (' + (postitPage + 1) + '/' + tp + ')' : '';
  document.getElementById('postit-sub').textContent = '오늘 ' + postitMessages.length + '개의 한마디' + pageInfo;
  if (postitPage >= tp) postitPage = 0;
  var start = postitPage * POSTIT_PER_PAGE;
  var msgs = postitMessages.slice(start, start + POSTIT_PER_PAGE);
  var areaW = area.offsetWidth;
  var areaH = area.offsetHeight;
  var postitW = areaW * 0.32;
  var cols = 2;
  var rows = Math.ceil(msgs.length / cols);
  var colW = areaW / cols;
  var rowH = areaH / Math.max(rows, 2);
  msgs.forEach(function(msg, idx){
    var col = idx % cols;
    var row = Math.floor(idx / cols);
    var color = postitColors[idx % postitColors.length];
    var rotate = (Math.random() * 10 - 5).toFixed(1);
    var x = col * colW + Math.random() * (colW * 0.2);
    var y = row * rowH + Math.random() * (rowH * 0.2) + areaH * 0.04;
    var el = document.createElement('div');
    el.className = 'postit ' + color.bg;
    el.style.cssText =
      'left:' + x + 'px;top:' + y + 'px;width:' + postitW + 'px;--r:' + rotate + 'deg;' +
      'transform:rotate(' + rotate + 'deg);' +
      'animation:postitIn .5s cubic-bezier(.34,1.56,.64,1) ' + (idx * 0.1) + 's both,' +
      'float ' + (3 + Math.random() * 2).toFixed(1) + 's ' + (idx * 0.3) + 's ease-in-out infinite;';
    var timeStr = '';
    if (msg.time) {
      var parts = msg.time.trim().split(' ');
      if (parts.length >= 2) timeStr = parts[1].substring(0,5);
    }
    el.innerHTML =
      '<div class="postit-pin ' + color.pin + '"></div>' +
      '<div class="postit-msg">' + escHtml(msg.message) + '</div>' +
      (timeStr ? '<div class="postit-time">' + timeStr + '</div>' : '');
    area.appendChild(el);
  });
}

// ── 리워드 바 ────────────────────────────────────────────────
function renderRewardBar() {
  if(!allRewards.length) return;
  var sorted = allRewards.slice().sort(function(a,b){ return a.days - b.days; });
  document.getElementById('reward-bar-items').innerHTML = sorted.map(function(r){
    return '<div class="rbi"><span class="rbi-emoji">' + r.emoji + '</span>' +
      '<div class="rbi-info"><span class="rbi-name">' + r.name + '</span>' +
      '<span class="rbi-days">' + r.days + '회</span></div></div>';
  }).join('');
}

// ── 데이터 로드 ──────────────────────────────────────────────
function loadRewards(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',DEPLOY_URL+'?page=rewards',true);
  xhr.timeout=10000;
  xhr.onload=function(){
    try{
      var data=JSON.parse(xhr.responseText);
      if(data.ok&&data.rewards){ allRewards=data.rewards; renderRewardBar(); if(allRanking.length) renderPage(currentPage); }
    }catch(e){}
  };
  xhr.send();
}

function loadMessages() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', DEPLOY_URL + '?page=messages', true);
  xhr.timeout = 10000;
  xhr.onload = function(){
    try{
      var data = JSON.parse(xhr.responseText);
      if(data.ok && data.messages){ postitMessages = data.messages; if(currentTab === 'note') renderPostits(); }
    }catch(e){}
  };
  xhr.onerror = xhr.ontimeout = function(){};
  xhr.send();
}

function loadRanking(){
  if(!TODAY_STR) return;
  var month=TODAY_STR.substring(0,7);
  var xhr=new XMLHttpRequest();
  xhr.open('GET',DEPLOY_URL+'?page=ranking&month='+month,true);
  xhr.timeout=10000;
  xhr.onload=function(){
    try{
      var data=JSON.parse(xhr.responseText);
      if(data.ok&&data.ranking){
        allRanking=data.ranking.filter(function(r){return r.monthCount>0;});
        totalPages=Math.ceil(allRanking.length/ITEMS_PER_PAGE)||1;
        currentPage=0;
        var d=new Date();
        document.getElementById('rank-month').textContent=(d.getMonth()+1)+'월 출석 랭킹';
        document.getElementById('rank-sub').textContent='총 '+allRanking.length+'명 참여 중';
        document.getElementById('update-time').textContent='최종 업데이트: '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
        renderPage(0);
      }
    }catch(e){}
  };
  xhr.send();
}

function loadTodayCount(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',DEPLOY_URL+'?page=stats',true);
  xhr.onload=function(){
    try{var data=JSON.parse(xhr.responseText);if(data.ok)document.getElementById('today-num').textContent=data.todayCount;}
    catch(e){}
  };
  xhr.send();
}

// ── 랭킹 렌더링 ──────────────────────────────────────────────
function getNextRewardProgress(monthCount) {
  if (!allRewards.length) return null;
  var sorted = allRewards.slice().sort(function(a,b){ return a.days - b.days; });
  var prevDays = 0;
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].days > monthCount) {
      var range = sorted[i].days - prevDays;
      var progress = monthCount - prevDays;
      return { reward: sorted[i], remaining: sorted[i].days - monthCount, pct: Math.round(progress / range * 100) };
    }
    prevDays = sorted[i].days;
  }
  return null;
}

var MEDALS=['🥇','🥈','🥉'];

function renderPage(page){
  if(!allRanking.length) return;
  var list=document.getElementById('rank-list');
  var start=page*ITEMS_PER_PAGE;
  var items=allRanking.slice(start,start+ITEMS_PER_PAGE);
  list.querySelectorAll('.rank-item').forEach(function(el){el.classList.add('fadeout');});
  setTimeout(function(){
    list.innerHTML='';
    items.forEach(function(m,idx){
      var gi=start+idx;
      var mc=gi<3?'medal-'+(gi+1):'medal-n';
      var ms=gi<3?MEDALS[gi]:String(gi+1);
      var div=document.createElement('div');
      div.className='rank-item fadein';
      div.style.animationDelay=(idx*0.08)+'s';
      var nr=getNextRewardProgress(m.monthCount);
      var nextRwHtml=nr
        ?'<div class="rank-next-reward"><span>'+nr.reward.emoji+' '+nr.remaining+'회 후 '+nr.reward.name+'</span>'+
          '<div class="nr-bar"><div class="nr-bar-fill" style="width:'+nr.pct+'%"></div></div></div>'
        :(allRewards.length?'<div class="rank-next-reward"><span>👑 최고 리워드 달성!</span></div>':'');
      div.innerHTML=
        '<div class="rank-medal '+mc+'">'+ms+'</div>'+
        '<div class="rank-info">'+
          '<div class="rank-email">'+maskEmail(m.email)+'</div>'+
          '<div class="rank-phone">'+maskPhone(m.phone)+'</div>'+
          nextRwHtml+
        '</div>'+
        '<div class="rank-count">'+m.monthCount+'<span>회</span></div>';
      list.appendChild(div);
    });
    var ind=document.getElementById('page-indicator');
    ind.innerHTML='';
    for(var i=0;i<totalPages;i++){
      var dot=document.createElement('div');
      dot.className='pi-dot'+(i===page?' active':'');
      ind.appendChild(dot);
    }
  },300);
}

function nextPage(){
  if(!allRanking.length) return;
  currentPage=(currentPage+1)%totalPages;
  renderPage(currentPage);
}

// ── QR ───────────────────────────────────────────────────────
function calcQRSize(){
  var panelW=window.innerWidth*0.52;
  var panelH=window.innerHeight;
  return Math.floor(Math.min(panelW*0.72,panelH*0.52));
}

function renderQR(token,date){
  if(!token||!date) return;
  QR_SIZE=calcQRSize();
  var canvas=document.getElementById('qr-canvas');
  canvas.width=QR_SIZE;canvas.height=QR_SIZE;
  canvas.style.width=QR_SIZE+'px';canvas.style.height=QR_SIZE+'px';
  var raw=document.getElementById('qr-raw');
  raw.innerHTML='';
  try{new QRCode(raw,{text:buildCheckinUrl(token,date),width:QR_SIZE,height:QR_SIZE,
    colorDark:'#111318',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}
  catch(e){return;}
  var attempts=0;
  function wait(){attempts++;if(attempts>30)return;
    var src=raw.querySelector('canvas')||raw.querySelector('img');
    if(!src){setTimeout(wait,100);return;}composite(src,token,date);}
  setTimeout(wait,100);
}

function composite(srcElem,token,date){
  var canvas=document.getElementById('qr-canvas');var ctx=canvas.getContext('2d');
  function draw(src){
    ctx.drawImage(src,0,0,QR_SIZE,QR_SIZE);currentDate=date;
    document.getElementById('s-date').textContent=date;
    document.getElementById('s-token').textContent=token.substring(0,6)+'…';
    document.getElementById('qr-frame').classList.add('qr-anim');
    setTimeout(function(){document.getElementById('qr-frame').classList.remove('qr-anim');},500);
    if(LOGO_URL)overlayLogo(ctx);
  }
  if(srcElem.tagName==='CANVAS'){draw(srcElem);}
  else{if(srcElem.complete&&srcElem.naturalWidth>0){draw(srcElem);}
    else{srcElem.onload=function(){draw(srcElem);};}}
}

function overlayLogo(ctx){
  var sz=Math.round(QR_SIZE*LOGO_RATIO);var cx=(QR_SIZE-sz)/2,cy=(QR_SIZE-sz)/2;
  var logo=new Image();logo.crossOrigin='anonymous';
  logo.onload=function(){
    ctx.save();ctx.beginPath();ctx.arc(QR_SIZE/2,QR_SIZE/2,sz/2+6,0,Math.PI*2);
    ctx.fillStyle='#ffffff';ctx.fill();ctx.beginPath();
    ctx.arc(QR_SIZE/2,QR_SIZE/2,sz/2,0,Math.PI*2);ctx.clip();
    ctx.drawImage(logo,cx,cy,sz,sz);ctx.restore();
  };logo.src=LOGO_URL;
}

// ── tick (자정 감지 → 새로고침) ──────────────────────────────
function tick(){
  var now=new Date();
  var mid=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
  var diff=mid-now;
  document.getElementById('s-timer').textContent=pad(Math.floor(diff/3600000))+':'+pad(Math.floor((diff%3600000)/60000))+':'+pad(Math.floor((diff%60000)/1000));
  document.getElementById('clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  if(currentDate && getLocalDate() !== currentDate){
    location.reload(); // GitHub Pages에서는 자유롭게 작동!
  }
}

function applyPortrait() {
  document.body.style.flexDirection = 'column';
  var left = document.querySelector('.left-panel');
  var right = document.querySelector('.right-panel');
  left.style.width = '100vw';
  left.style.height = '55vh';
  left.style.borderRight = 'none';
  left.style.borderBottom = '1px solid rgba(0,0,0,.08)';
  right.style.width = '100vw';
  right.style.height = '45vh';
}

var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);resizeTimer=setTimeout(function(){renderQR(TOKEN_VAL,TODAY_STR);},300);
});

window.addEventListener('load',function(){
  loadInitConfig();
  setTimeout(function(){
    tick();
    setInterval(tick,1000);
    loadRewards();
    loadRanking();
    loadMessages();
    setInterval(nextPage,5000);
    setInterval(loadTodayCount,30000);
    setInterval(loadRanking,120000);
    setInterval(loadRewards,120000);
    setInterval(loadMessages,30000);
    setInterval(nextPostitPage,30000);
    startAutoTab();
  }, 2000); // 초기 설정 로드 후 2초 뒤 시작
});
</script>
